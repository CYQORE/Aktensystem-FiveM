# CI-Workflow (ausgelagert)
#
# Aktivieren: Datei nach `.github/workflows/ci.yml` verschieben und pushen.
# Push von `.github/workflows/*` braucht gh-Token mit `workflow`-Scope:
#   gh auth refresh -h github.com -s workflow
# Alternativ direkt über die GitHub-Weboberfläche anlegen.

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm --filter @aktensystem/database db:generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
