<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aktensystem CAD</title>
    <style>
      html, body { margin: 0; height: 100%; background: transparent; }
      #wrap { display: none; position: fixed; inset: 0; }
      #wrap.open { display: block; }
      iframe { width: 100%; height: 100%; border: 0; }
    </style>
  </head>
  <body>
    <div id="wrap">
      <iframe id="cad" allow="clipboard-read; clipboard-write"></iframe>
    </div>
    <script>
      const wrap = document.getElementById("wrap");
      const frame = document.getElementById("cad");

      // Nachrichten vom Lua-Client (SendNUIMessage)
      window.addEventListener("message", (e) => {
        const data = e.data || {};
        if (data.action === "open" && data.url) {
          frame.src = data.url; // CAD mit #code=… -> Auto-Login
          wrap.classList.add("open");
        } else if (data.action === "close") {
          wrap.classList.remove("open");
          frame.src = "about:blank";
        }
      });

      // ESC schließt das CAD und gibt den Fokus frei
      document.addEventListener("keyup", (e) => {
        if (e.key === "Escape") {
          wrap.classList.remove("open");
          frame.src = "about:blank";
          fetch(`https://${getParent()}/close`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: "{}",
          }).catch(() => {});
        }
      });

      function getParent() {
        // Resource-Name für NUI-Callback
        return window.GetParentResourceName
          ? window.GetParentResourceName()
          : "s6mdt";
      }
    </script>
  </body>
</html>
