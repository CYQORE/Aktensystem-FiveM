# S6mdt — Produktions-Stack (auf den Server laden, hier ausführen).
# DB = bestehende FiveM-MySQL (extern). Redis + MinIO laufen mit.
# Start:  cp .env.example .env  &&  (Werte setzen)  &&  docker compose up -d --build
name: s6mdt

services:
  api:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.api
    restart: unless-stopped
    env_file: .env
    ports:
      - "4000:4000"
    extra_hosts:
      # erlaubt DATABASE_URL host "host.docker.internal" (MySQL auf dem Host)
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
      - minio

  web:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - api

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - ./.data/redis:/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./.data/minio:/data
