# S6mdt — Produktions-Stack hinter bestehendem Traefik (root_default).
# Web/API werden von Traefik unter cad.cyqore.app per HTTPS bedient.
# Eigene MariaDB (SQL-Auto-Import via initdb.d). FiveM-DB bleibt unangetastet.
#
# Start:  cp .env.example .env  &&  (Secrets setzen)  &&  docker compose up -d --build
# Stammdaten:  docker compose exec api pnpm --filter @aktensystem/database db:seed
name: s6mdt

services:
  mariadb:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: s6mdt
    volumes:
      - ./.data/mariadb:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 30

  api:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.api
    restart: unless-stopped
    env_file: .env
    environment:
      # DATABASE_URL aus .env überschreibt den Default (mitgelieferte MariaDB).
      # Für Server-Sync (Spieler/Fahrzeuge aus der Game-DB) DATABASE_URL in .env
      # auf die FiveM-Game-DB setzen, z. B.
      #   DATABASE_URL=mysql://USER:PASS@GAME_DB_HOST:3306/esxlegacy_e28cce
      DATABASE_URL: "${DATABASE_URL:-mysql://root:${DB_ROOT_PASSWORD}@mariadb:3306/s6mdt}"
      REDIS_URL: "redis://redis:6379"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    expose:
      - "4000"
    networks:
      - default
      - root_default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=root_default"
      - "traefik.http.routers.s6mdtapi.rule=Host(`cad.cyqore.app`) && (PathPrefix(`/api`) || PathPrefix(`/socket.io`))"
      - "traefik.http.routers.s6mdtapi.entrypoints=websecure"
      - "traefik.http.routers.s6mdtapi.tls=true"
      - "traefik.http.routers.s6mdtapi.tls.certresolver=mytlschallenge"
      - "traefik.http.routers.s6mdtapi.priority=100"
      - "traefik.http.services.s6mdtapi.loadbalancer.server.port=4000"
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

  web:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    restart: unless-stopped
    env_file: .env
    expose:
      - "3000"
    networks:
      - default
      - root_default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=root_default"
      - "traefik.http.routers.s6mdtweb.rule=Host(`cad.cyqore.app`)"
      - "traefik.http.routers.s6mdtweb.entrypoints=websecure"
      - "traefik.http.routers.s6mdtweb.tls=true"
      - "traefik.http.routers.s6mdtweb.tls.certresolver=mytlschallenge"
      - "traefik.http.services.s6mdtweb.loadbalancer.server.port=3000"
    depends_on:
      - api

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - ./.data/redis:/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - ./.data/minio:/data

# default = internes S6mdt-Netz (DB/Redis/MinIO). root_default = bestehendes Traefik-Netz.
networks:
  default:
  root_default:
    external: true
